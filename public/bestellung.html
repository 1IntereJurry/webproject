<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brötchen bestellen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar neumorphic">
    <div class="brand">Blåvand Lieferservice</div>
    <button id="menu-toggle" class="menu-button">☰</button>
  </header>

  <nav id="mobile-menu" class="dropdown-menu neumorphic-inset">
    <ul>
      <li><a href="index.html">🏠 Start</a></li>
      <li><a href="login.html">🔐 Login</a></li>
      <li><a href="bestellung.html">📦 Bestellung</a></li>
    </ul>
  </nav>

  <main>
    <!-- 🗺️ Karte mit Filiale -->
    <div class="map-container neumorphic-card">
      <h2>Unsere Filiale</h2>
      <iframe
        src="https://maps.google.com/maps?q=Ilsigvej%2021,%20Blokhus,%20Dänemark&t=&z=15&ie=UTF8&iwloc=&output=embed"
        width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy">
      </iframe>
    </div>

    <!-- 🧾 Bestellformular -->
    <div class="neumorphic neumorphic-card">
      <h2>Brötchen bestellen</h2>
      <form action="/bestellung" method="POST" enctype="multipart/form-data">
        <label>Lieferadresse:</label>
        <input type="text" name="adresse" required />

        <label>Kaiserbrötchen:</label>
        <input type="number" name="kaiser" min="0" value="0" />

        <label>Vollkornbrötchen:</label>
        <input type="number" name="vollkorn" min="0" value="0" />

        <label>Schokobrötchen:</label>
        <input type="number" name="schoko" min="0" value="0" />

        <label>Lieferdauer:</label>
        <select name="laufzeit">
          <option value="einmalig">Einmalige Lieferung</option>
          <option value="1woche">1 Woche</option>
          <option value="1monat">1 Monat</option>
        </select>

        <label>Bild vom Ablageort (optional):</label>
        <input type="file" name="ablagebild" accept="image/*" />

        <button type="submit">Bestellung abschicken</button>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('menu-toggle').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('active');
    });
  </script>

</body>
</html>
