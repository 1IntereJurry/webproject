<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brötchen bestellen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar neumorphic">
    <div class="brand">Blåvand Lieferservice</div>
    <button id="menu-toggle" class="menu-button">☰</button>
  </header>

  <nav id="mobile-menu" class="dropdown-menu neumorphic-inset">
    <ul>
      <li><a href="index.html">🏠 Start</a></li>
      <li><a href="login.html">🔐 Login</a></li>
      <li><a href="bestellung.html">📦 Bestellung</a></li>
    </ul>
  </nav>

  
<main>
  <!-- 📍 Karte -->
  <div class="neumorphic neumorphic-card">
    <h2>Unsere Filiale</h2>
    <iframe
      src="https://maps.google.com/maps?q=Ilsigvej%2021,%20Blokhus,%20Dänemark&t=&z=15&ie=UTF8&iwloc=&output=embed"
      width="100%" height="300" style="border:0;" allowfullscreen loading="lazy">
    </iframe>
  </div>

  <!-- 🧾 Neues Bestellformular -->
  <div class="neumorphic neumorphic-card">
    <h2>Brötchen bestellen</h2>
    <form action="/bestellung" method="POST" enctype="multipart/form-data">

      <fieldset>
        <legend>👤 Lieferadresse</legend>
        <input type="text" name="adresse" placeholder="z. B. Mühlenweg 12, 25980 Sylt" required />
      </fieldset>

 <div class="brotzeile">
  <label for="kaiser">Kaiserbrötchen:</label>
  <div class="counter">
    <button type="button" class="minus">−</button>
    <input type="number" name="kaiser" id="kaiser" value="0" min="0" />
    <button type="button" class="plus">+</button>
  </div>
  
    <label for="schoko">Schokobrötchen:</label>
  <div class="counter">
    <button type="button" class="minus">−</button>
    <input type="number" name="kaiser" id="kaiser" value="0" min="0" />
    <button type="button" class="plus">+</button>
  </div>
  
    <label for="vollkorn">Vollkornbrötchen:</label>
  <div class="counter">
    <button type="button" class="minus">−</button>
    <input type="number" name="kaiser" id="kaiser" value="0" min="0" />
    <button type="button" class="plus">+</button>
  </div>



  <label>Schokobrötchen:</label>
  <select name="schoko">
    <option value="0">0</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
</fieldset>

      <fieldset>
        <legend>📆 Lieferzeitraum</legend>
        <label>Startdatum:</label>
        <input type="date" name="startdatum" required />

        <label>Enddatum:</label>
        <input type="date" name="enddatum" />
        <small>Lass das Feld leer für Einmalbestellung</small>
      </fieldset>

      <fieldset>
        <legend>📸 Ablageort (optional)</legend>
        <label>Foto hochladen:</label>
        <input type="file" name="ablagebild" accept="image/*" />
      </fieldset>

      <button type="submit">🛒 Bestellung abschicken</button>
    </form>
  </div>
</main>
